<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>PURIKURA STUDIO &#9733;</title>
  <link rel="stylesheet" href="style.css">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('SW registered!', reg))
          .catch(err => console.error('SW error', err));
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>
  <div id="app">
    <header>
      <div class="logo">PHOTO-BOOTH &#9733;</div>
      <div style="display:flex;justify-content:center;margin-top:12px;gap:15px;flex-wrap:wrap;">
        <div class="coin">
          <div class="coin-dot"></div>&#9733; READY &middot; INSERT COIN &middot; &yen;100 &#9733;
        </div>
        <button id="party-mode-btn" class="cpill-btn" style="background:var(--purple);color:white;border-color:#111;">
          &#127882; PARTY MODE
        </button>
      </div>
      <div id="room-info" style="display:none;margin-top:10px;font-family:'DotGothic16';font-weight:bold;color:var(--hot-pink);">
        ROOM ID: <span id="display-room-id">---</span> 
        <button id="leave-room-btn" style="padding:2px 8px;font-size:0.8rem;margin-left:10px;">LEAVE</button>
      </div>
    </header>

    <div id="room-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:2000;align-items:center;justify-content:center;padding:20px;">
      <div style="background:var(--white);border:var(--y2k-border);box-shadow:var(--y2k-shadow);padding:30px;border-radius:16px;max-width:400px;width:100%;text-align:center;">
        <h2 style="font-family:'DotGothic16';margin-bottom:20px;">&#127881; PARTY SETUP</h2>
        <div style="display:flex;flex-direction:column;gap:15px;">
          <button id="create-room-btn" class="save-btn" style="background:var(--lime);">CREATE NEW ROOM</button>
          <div style="margin:10px 0;font-weight:bold;">- OR -</div>
          <input type="text" id="room-input" placeholder="ENTER ROOM ID..." class="caption-inp" style="margin-top:0;">
          <button id="join-room-btn" class="save-btn">JOIN ROOM</button>
          <button id="close-modal-btn" style="background:#eee;border:none;margin-top:10px;">CANCEL</button>
        </div>
      </div>
    </div>

    <div class="main">
      <!-- LEFT: CAMERA -->
      <div>
        <div class="cam-card">
          <div id="video-container">
            <video id="video" autoplay muted playsinline></video>
          </div>
          <canvas id="bg-canvas"
            style="position:absolute;top:15px;left:15px;width:calc(100% - 30px);height:calc(100% - 30px);border-radius:6px;object-fit:cover;pointer-events:none;z-index:2;display:none;"></canvas>
          <div id="vign-ov"
            style="position:absolute;inset:15px;pointer-events:none;z-index:5;border-radius:6px;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.5) 100%);opacity:0;transition:opacity 0.3s;">
          </div>
          <canvas id="grain-c"
            style="position:absolute;inset:15px;pointer-events:none;z-index:6;opacity:0.05;mix-blend-mode:screen;"></canvas>
          <div class="live-badge">
            <div class="live-dot"></div>&#9679; LIVE
          </div>
          <div class="shot-counter" id="shot-counter">&#128247; 0/3</div>
          <div id="countdown-el"></div>
          <div id="flash-el"></div>
          <div id="progress-ring">
            <svg width="200" height="200" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
              <circle id="prog-circle" cx="100" cy="100" r="80" fill="none" stroke="url(#pg)" stroke-width="6"
                stroke-dasharray="502" stroke-dashoffset="502" stroke-linecap="round" transform="rotate(-90 100 100)" />
              <defs>
                <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ff007f" />
                  <stop offset="50%" stop-color="#00ffff" />
                  <stop offset="100%" stop-color="#b026ff" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div id="perm-screen">
            <h3>KONNICHIWA! &#9733;</h3>
            <p>CAMERA NEEDED TO BEGIN</p>
            <button id="start-btn">&#128247; Enable Camera</button>
          </div>
        </div>

        <div style="text-align:center;margin-top:15px;margin-bottom:15px;">
          <div class="tagline">&#9733; INSERT YOURSELF HERE &#9733;</div>
        </div>

        <div class="shoot-zone">
          <div class="ctrl-row">
            <button class="cpill-btn" id="flip-btn" disabled>&#8596; FLIP</button>
            <label style="display:flex;flex-direction:column;gap:4px;font-size:1rem;font-weight:bold;">
              TIMER
              <select class="cpill-btn" id="timer-sel" disabled>
                <option value="3">3 SEC</option>
                <option value="5">5 SEC</option>
                <option value="10">10 SEC</option>
              </select>
            </label>
            <label style="display:flex;flex-direction:column;gap:4px;font-size:1rem;font-weight:bold;">
              QUALITY
              <select class="cpill-btn" id="res-sel">
                <option value="720">720p</option>
                <option value="1080">1080p</option>
                <option value="1440">1440p</option>
              </select>
            </label>
            <label style="display:flex;flex-direction:column;gap:4px;font-size:1rem;font-weight:bold;">
              SHOTS
              <select class="cpill-btn" id="shots-sel">
                <option value="2">&times; 2</option>
                <option value="3" selected>&times; 3</option>
                <option value="4">&times; 4</option>
              </select>
            </label>
          </div>

          <button class="shoot-btn" id="snap-btn" disabled title="Take Photo (Space)">&#128248;</button>

          <div class="ctrl-row">
            <button class="cpill-btn" id="voice-btn" disabled>&#127897; VOICE OFF</button>
            <button class="cpill-btn" id="burst-btn" disabled>&#9889; BURST</button>
            <button class="cpill-btn" id="retake-btn">&#8634; RETAKE</button>
          </div>
        </div>

        <div style="text-align:center;margin-top:15px;">
          <span class="keyboard-hints">SPACE = SHOOT &nbsp;&middot;&nbsp; R = RETAKE &nbsp;&middot;&nbsp; F = FILTER
            &nbsp;&middot;&nbsp; S = SAVE</span>
        </div>
      </div>

      <!-- RIGHT: STRIP -->
      <div>
        <div class="strip-card">
          <div
            style="font-family:'DotGothic16',monospace;font-size:1.4rem;font-weight:bold;margin-bottom:15px;text-align:center;">
            &#128247; PHOTO STRIP</div>
          <div class="strip-photos" id="strip-photos"></div>
          <div class="shot-dots" id="shot-dots"></div>
        </div>

        <div style="margin-top:15px;">
          <label style="font-size:1.1rem;font-weight:bold;display:block;margin-bottom:8px;">&#9999; CAPTION</label>
          <input class="caption-inp" id="caption" placeholder="write something cute... &#9733;" maxlength="28">
        </div>

        <div class="save-wrap">
          <div class="save-dropdown" id="save-dd">
            <button class="save-opt" id="opt-save">&#11015; Save PNG</button>
            <button class="save-opt" id="opt-copy">&#10697; Copy Image</button>
            <button class="save-opt" id="opt-share">&#8599; Share</button>
            <button class="save-opt" id="opt-print">&#9113; Print 2&times;6"</button>
          </div>
          <button class="save-btn" id="save-btn" disabled>&#128424; PRINT &amp; SAVE &#9662;</button>
        </div>


        <div
          style="margin-top:20px;background:#fff;border:3px solid #111;border-radius:12px;padding:15px;box-shadow:3px 3px 0 #111;">
          <div style="font-family:'DotGothic16',monospace;font-size:1.3rem;font-weight:bold;margin-bottom:12px;">
            &#127912; BORDER / BG</div>
          <div class="bswatch-row" id="bswatches"></div>
          <div class="bgswatch-row" id="bgswatches"
            style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-top:10px;align-items:center;">
            <label class="bgswatch"
              style="display:flex;align-items:center;justify-content:center;background:#eee;font-size:1.5rem;"
              title="Custom Image">
              + <input type="file" id="strip-bg-inp" accept="image/*" style="display:none;">
            </label>
          </div>
          <div class="lay-row">
            <div class="laypill active" data-lay="v">STRIP</div>
            <div class="laypill" data-lay="p">POLAR</div>
            <div class="laypill" data-lay="h">WIDE</div>
          </div>
          <label
            style="display:flex;align-items:center;gap:12px;margin-top:15px;font-size:1.1rem;font-weight:bold;cursor:pointer;">
            <input type="checkbox" id="date-cb" style="width:20px;height:20px;accent-color:#ff007f;"> &#128197; DATE
            STAMP
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- DRAWER -->
  <div class="drawer" id="drawer">
    <div class="drawer-handle">
      <div class="drawer-tabs">
        <button class="drawer-tab active" data-tab="filters">&#127912; FILTERS</button>
        <button class="drawer-tab" data-tab="bg">&#127748; BACKGROUND</button>
        <button class="drawer-tab" data-tab="adjust">&#128295; ADJUST</button>
        <button class="drawer-tab" data-tab="stickers">&#10024; STICKERS</button>
        <button class="drawer-tab" data-tab="frames">&#128444; FRAMES</button>
        <button class="drawer-tab" data-tab="text">&#9999; TEXT</button>
      </div>
      <button class="drawer-toggle" id="drawer-toggle">&#9652; OPEN</button>
    </div>
    <div class="drawer-content">
      <div class="tab-pane active" id="tab-filters">
        <div class="filter-scroll" id="filter-scroll"></div>
      </div>
      <div class="tab-pane" id="tab-bg">
        <div style="display:flex;gap:10px;padding:10px;">
          <button class="cpill-btn" id="bg-none" style="flex:1;">NONE</button>
          <button class="cpill-btn" id="bg-blur" style="flex:1;">BLUR</button>
          <label class="cpill-btn" style="flex:1;text-align:center;cursor:pointer;">
            COLOR <input type="color" id="bg-color" value="#ff007f"
              style="opacity:0;width:0;height:0;position:absolute;">
          </label>
          <label class="cpill-btn" style="flex:1;text-align:center;cursor:pointer;">
            IMAGE <input type="file" id="bg-img-inp" accept="image/*" style="display:none;">
          </label>
        </div>
        <div id="bg-presets" style="display:flex;gap:10px;padding:0 10px 10px;overflow-x:auto;align-items:center;">
        </div>
      </div>
      <div class="tab-pane" id="tab-adjust">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:10px;">
          <label>Brightness <input type="range" id="sl-b" min="50" max="150" value="100"></label>
          <label>Contrast <input type="range" id="sl-c" min="50" max="150" value="100"></label>
          <label>Saturation <input type="range" id="sl-s" min="0" max="200" value="100"></label>
          <label>Hue <input type="range" id="sl-h" min="0" max="360" value="0"></label>
          <label>Zoom <input type="range" id="sl-z" min="100" max="200" value="100"></label>
          <label>Vignette <input type="range" id="sl-v" min="0" max="100" value="0"></label>
          <label>Film Grain <input type="range" id="sl-g" min="0" max="100" value="5"></label>
        </div>
      </div>
      <div class="tab-pane" id="tab-stickers">
        <div class="stab-row" id="stab-row"></div>
        <div class="sbubbles" id="sbubbles"></div>
      </div>
      <div class="tab-pane" id="tab-frames">
        <div class="frames-grid" id="frames-grid"></div>
      </div>
      <div class="tab-pane" id="tab-text">
        <div style="padding:10px;">
          <div style="display:flex;gap:10px;margin-bottom:15px;">
            <input type="text" id="txt-inp" placeholder="Type here..."
              style="flex:1;padding:8px;border:2px solid #111;border-radius:4px;font-family:'M PLUS Rounded 1c';">
            <select id="txt-font" style="padding:8px;border:2px solid #111;border-radius:4px;font-weight:bold;">
              <option value="'M PLUS Rounded 1c'">ROUND</option>
              <option value="'DotGothic16'">PIXEL</option>
              <option value="'Pacifico'">SCRIPT</option>
            </select>
            <button id="add-txt-btn"
              style="padding:8px 12px;background:#111;color:#fff;border:none;border-radius:4px;font-weight:bold;cursor:pointer;">ADD</button>
          </div>
          <div style="margin-bottom:10px;font-weight:bold;font-family:'DotGothic16';">TEXT COLOR</div>
          <div class="pwatch-row" id="pwatches"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // GRAIN
    const gc = document.getElementById('grain-c'); const gx = gc.getContext('2d');
    let grainAmt = 0.05;
    (function grain() {
      gc.width = gc.offsetWidth || 400; gc.height = gc.offsetHeight || 300;
      const id = gx.createImageData(gc.width, gc.height); const d = id.data;
      for (let i = 0; i < d.length; i += 4) { const v = Math.random() * 255; d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = grainAmt * 255; }
      gx.putImageData(id, 0, 0); requestAnimationFrame(grain);
    })();
    // SPROCKETS (elements removed in new layout ? guard safely)
    function buildSprockets() {
      ['sp-left', 'sp-right'].forEach(id => {
        const el = document.getElementById(id); if (!el) return;
        el.innerHTML = '';
        for (let i = 0; i < 12; i++) { const s = document.createElement('div'); s.className = 'sprocket'; el.appendChild(s); }
      });
    }
    buildSprockets();
    // AUDIO
    let aC = null;
    function ac() { if (!aC) aC = new (window.AudioContext || window.webkitAudioContext)(); return aC; }
    function beep(f = 440, d = 0.1, v = 0.15) { try { const o = ac().createOscillator(), g = ac().createGain(); o.connect(g); g.connect(ac().destination); o.frequency.value = f; g.gain.setValueAtTime(v, ac().currentTime); g.gain.exponentialRampToValueAtTime(0.001, ac().currentTime + d); o.start(); o.stop(ac().currentTime + d); } catch (e) { } }
    function shutter() { try { const o = ac().createOscillator(), g = ac().createGain(); o.connect(g); g.connect(ac().destination); o.frequency.setValueAtTime(800, ac().currentTime); o.frequency.exponentialRampToValueAtTime(200, ac().currentTime + 0.07); g.gain.setValueAtTime(0.3, ac().currentTime); g.gain.exponentialRampToValueAtTime(0.001, ac().currentTime + 0.1); o.start(); o.stop(ac().currentTime + 0.1); } catch (e) { } }
    // FILTERS
    const FILTERS = [
      // — NATURAL —————————————
      { n: 'NATURAL', css: 'none' },
      { n: 'BRIGHT', css: 'brightness(115%) contrast(95%) saturate(110%)' },
      { n: 'SOFT', css: 'brightness(108%) contrast(88%) saturate(80%) blur(0.4px)' },

      // — FILM / ANALOG —————————————
      { n: 'KODAK 400', css: 'sepia(18%) saturate(140%) contrast(105%) brightness(103%) hue-rotate(5deg)' },
      { n: 'KODAK 200', css: 'sepia(25%) saturate(120%) contrast(100%) brightness(108%) hue-rotate(10deg)' },
      { n: 'FUJI 400', css: 'sepia(10%) saturate(160%) contrast(108%) brightness(100%) hue-rotate(-8deg)' },
      { n: 'FUJI PRO', css: 'sepia(8%) saturate(130%) contrast(112%) brightness(97%) hue-rotate(-15deg)' },
      { n: 'PORTRA', css: 'sepia(20%) saturate(110%) contrast(98%) brightness(112%) hue-rotate(8deg)' },
      { n: 'CINESTILL', css: 'sepia(12%) saturate(140%) contrast(110%) brightness(95%) hue-rotate(-20deg)' },
      { n: 'SUPERIA', css: 'sepia(15%) saturate(135%) contrast(103%) brightness(105%) hue-rotate(5deg)' },

      // — BLACK AND WHITE —————————————
      { n: 'B&W', css: 'grayscale(100%) contrast(110%)' },
      { n: 'ILFORD', css: 'grayscale(100%) contrast(140%) brightness(90%)' },
      { n: 'TMAX', css: 'grayscale(100%) contrast(180%) brightness(85%)' },
      { n: 'AGFA', css: 'grayscale(100%) contrast(120%) brightness(95%) sepia(10%)' },

      // — VINTAGE / ERA —————————————
      { n: '60s', css: 'sepia(60%) saturate(60%) contrast(90%) brightness(110%)' },
      { n: '70s', css: 'sepia(40%) saturate(80%) contrast(95%) brightness(105%) hue-rotate(15deg)' },
      { n: '80s', css: 'contrast(130%) saturate(200%) hue-rotate(340deg) brightness(95%)' },
      { n: '90s PRINT', css: 'saturate(80%) contrast(105%) brightness(107%) sepia(15%)' },
      { n: 'Y2K', css: 'saturate(180%) contrast(155%) hue-rotate(200deg) brightness(100%)' },

      // — INSTANT / POLAROID —————————————
      { n: 'POLAROID', css: 'sepia(22%) saturate(90%) contrast(92%) brightness(113%) hue-rotate(12deg)' },
      { n: 'INSTAX', css: 'brightness(120%) saturate(130%) contrast(90%) hue-rotate(-5deg)' },
      { n: 'FADED', css: 'saturate(50%) contrast(85%) brightness(118%)' },

      // — MOOD —————————————
      { n: 'GOLDEN', css: 'sepia(35%) saturate(130%) brightness(112%) contrast(95%) hue-rotate(5deg)' },
      { n: 'COOL FILM', css: 'hue-rotate(175deg) saturate(90%) contrast(105%) brightness(102%) sepia(10%)' },
      { n: 'DUSK', css: 'sepia(30%) saturate(120%) hue-rotate(320deg) contrast(108%) brightness(95%)' }
    ];
    let curFilter = 'none';
    const fCanvases = [];
    function buildFilters() {
      const row = document.getElementById('filter-scroll');
      FILTERS.forEach((f, i) => {
        const card = document.createElement('div'); card.className = 'fcard' + (i === 0 ? ' active' : '');
        const fc = document.createElement('canvas'); fc.width = 64; fc.height = 48;
        fCanvases.push({ c: fc, f: f.css });
        const nm = document.createElement('div'); nm.className = 'fcard-name'; nm.textContent = f.n;
        card.appendChild(fc); card.appendChild(nm);
        card.onclick = () => {
          curFilter = f.css; applyVF();
          row.querySelectorAll('.fcard').forEach(x => x.classList.remove('active'));
          card.classList.add('active');
        };
        row.appendChild(card);
      });
    }
    function applyVF() {
      const b = document.getElementById('sl-b').value, cc = document.getElementById('sl-c').value,
        s = document.getElementById('sl-s').value, h = document.getElementById('sl-h').value;
      const m = `brightness(${b}%) contrast(${cc}%) saturate(${s}%) hue-rotate(${h}deg)`;
      const fStr = curFilter === 'none' ? m : curFilter + ' ' + m;
      video.style.filter = fStr;
      bgCanvas.style.filter = fStr;
      const z = document.getElementById('sl-z').value;
      const tStr = `scale(${z / 100})${flipped ? ' scaleX(-1)' : ''}`;
      video.style.transform = tStr;
      bgCanvas.style.transform = tStr;
    }
    function thumbLoop() {
      if (!video.srcObject) { requestAnimationFrame(thumbLoop); return; }
      fCanvases.forEach(({ c, f }) => { const x = c.getContext('2d'); x.filter = f; x.drawImage(video, 0, 0, 64, 48); });
      requestAnimationFrame(thumbLoop);
    }
    // SLIDERS
    ['sl-b', 'sl-c', 'sl-s', 'sl-h', 'sl-z'].forEach(id => document.getElementById(id).oninput = applyVF);
    document.getElementById('sl-v').oninput = function () { document.getElementById('vign-ov').style.opacity = this.value / 100; };
    document.getElementById('sl-g').oninput = function () { grainAmt = this.value / 100; gc.style.opacity = Math.min(0.12, grainAmt * 1.5); };
    // DRAWER
    let drawerOpen = false, activeTab = 'filters';
    const drawer = document.getElementById('drawer');
    const toggle = document.getElementById('drawer-toggle');
    function openDrawer() { drawerOpen = true; drawer.style.height = '320px'; toggle.classList.add('open'); toggle.textContent = '? CLOSE'; }
    function closeDrawer() { drawerOpen = false; drawer.style.height = '70px'; toggle.classList.remove('open'); toggle.textContent = '? OPEN'; }
    toggle.onclick = () => { if (drawerOpen) closeDrawer(); else openDrawer(); };
    document.querySelectorAll('.drawer-tab').forEach(t => {
      t.onclick = () => {
        const tab = t.dataset.tab;
        document.querySelectorAll('.drawer-tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        activeTab = tab;
        if (!drawerOpen) openDrawer();
      };
    });
    // STICKERS
    const STICKER_CATS = {
      '✨ Sparkle': ['✨', '💫', '🌟', '❇️', '🎇', '🎆', '🔮', '🪄', '💎', '🫧'],
      '💖 Love': ['💖', '💘', '💝', '💕', '💞', '💓', '💗', '🫶', '💌', '💋'],
      '🌸 Nature': ['🌸', '🌺', '🌻', '🍄', '🦋', '🐞', '🍀', '🌵', '🍓', '🍒'],
      '🥺 Mood': ['🥺', '😭', '😡', '😇', '🤪', '🤫', '🫣', '🤭', '🤩', '😴'],
      '🎀 Kawaii': ['🎀', '🧸', '🍡', '🍥', '🌸', '🍓', '☁️', '🌙', '🐇', '🐈'],
    };
    let selSticker = null, activeSCat = Object.keys(STICKER_CATS)[0];
    function buildStickerCats() {
      const row = document.getElementById('stab-row'); row.innerHTML = '';
      Object.keys(STICKER_CATS).forEach(k => {
        const b = document.createElement('button'); b.className = 'stab' + (k === activeSCat ? ' active' : '');
        b.textContent = k;
        b.onclick = () => {
          activeSCat = k;
          row.querySelectorAll('.stab').forEach(x => x.classList.remove('active')); b.classList.add('active');
          renderSBubbles();
        };
        row.appendChild(b);
      });
    }
    function renderSBubbles() {
      const g = document.getElementById('sbubbles'); g.innerHTML = '';
      (STICKER_CATS[activeSCat] || []).forEach(s => {
        const b = document.createElement('div'); b.className = 'sbub' + (s === selSticker ? ' sel' : '');
        b.textContent = s;
        b.onclick = () => {
          selSticker = selSticker === s ? null : s;
          g.querySelectorAll('.sbub').forEach(x => x.classList.remove('sel'));
          if (selSticker) b.classList.add('sel');
        };
        g.appendChild(b);
      });
    }
    buildStickerCats(); renderSBubbles();
    // FRAMES

      const cap = document.getElementById('caption').value.trim();
      const showD = document.getElementById('date-cb').checked;
      const CH = cap ? 22 : 0, DH = showD ? 12 : 0;
      const TH = PAD * 2 + maxPhotos * PH + (maxPhotos - 1) * GAP + CH + DH;
      const sc = document.createElement('canvas'); sc.width = PW + PERF * 2; sc.height = TH;
      const sx = sc.getContext('2d');

      if (curStripBgUrl) {
        const bgImg = new Image();
        bgImg.src = curStripBgUrl;
        await new Promise(r => { bgImg.onload = r; bgImg.onerror = r; });

        sx.fillRect(0, 0, sc.width, TH);

        sx.fillStyle = curBorder.bg || '#fff';
        sx.fillRect(0, 0, sc.width, TH);

    }

    // KEYBOARD
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if (e.code === 'Space') { e.preventDefault(); takeShot(); }
      if (e.key === 'r' || e.key === 'R') document.getElementById('retake-btn').click();
      if (e.key === 's' || e.key === 'S') { if (!saveBtn.disabled) saveBtn.click(); }
      if (e.key === 'f' || e.key === 'F') {
        const cards = document.getElementById('filter-scroll').querySelectorAll('.fcard');
        let i = [...cards].findIndex(c => c.classList.contains('active'));
        cards[(i + 1) % cards.length].click();
      }
    });

    // VOICE TRIGGER
    let recognition = null, voiceActive = false;
    const voiceBtn = document.getElementById('voice-btn');
    function initVoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { voiceBtn.style.display = 'none'; return; }
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.onresult = (e) => {
        if (!voiceActive) return;
        let heard = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const text = e.results[i][0].transcript.toLowerCase();
          heard += text + ' ';
          if ((text.includes('cheese') || text.includes('shoot') || text.includes('snap') || text.includes('picture')) && !shooting && stream) {
            showToast('📸 VOICE TRIGGERED!');
            takeShot();
            recognition.stop();
            return;
          }
        }
        if (heard.trim().length > 0) {
          showToast('Heard: "' + heard.trim() + '"');
        }
      };
      recognition.onerror = (e) => {
        console.error('Speech error:', e.error);
        if (e.error === 'not-allowed') {
          showToast('MIC PERMISSION DENIED ❌');
          voiceActive = false;
          voiceBtn.innerHTML = '&#127897; VOICE OFF';
          voiceBtn.style.background = 'var(--white)';
          voiceBtn.style.color = 'var(--hot-pink)';
        }
      };
      recognition.onend = () => { if (voiceActive) recognition.start(); };
    }
    voiceBtn.onclick = () => {
      if (!recognition) { showToast('VOICE NOT SUPPORTED ❌'); return; }
      voiceActive = !voiceActive;
      if (voiceActive) {
        voiceBtn.innerHTML = '&#127897; SAY CHEESE!';
        voiceBtn.style.background = 'var(--hot-pink)';
        voiceBtn.style.color = 'white';
        try { recognition.start(); } catch (e) { }
        showToast('VOICE ON &#127897;');
      } else {
        voiceBtn.innerHTML = '&#127897; VOICE OFF';
        voiceBtn.style.background = 'var(--white)';
        voiceBtn.style.color = 'var(--hot-pink)';
        recognition.stop();
        showToast('VOICE OFF');
      }
    };
    initVoice();

    // AUTO START
    buildFilters();
    try {
      navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(s => {
        stream = s; video.srcObject = s;
        document.getElementById('perm-screen').style.display = 'none';
        document.getElementById('snap-btn').disabled = false;
        document.getElementById('burst-btn').disabled = false;
        document.getElementById('voice-btn').disabled = false;
        document.getElementById('flip-btn').disabled = false;
        document.getElementById('timer-sel').disabled = false;
        thumbLoop(); renderStrip();
      }).catch(() => { });
    } catch (e) { }

    // ═══════════════════════════════════════════════════
    // PARTY MODE — WebRTC multi-user photobooth rooms
    // ═══════════════════════════════════════════════════
    let peer = null;
    let roomId = null;
    let isHost = false;
    let peerConnections = {};   // peerId -> { conn (data), call, videoEl }
    let partyActive = false;
    const MAX_PEERS = 4; // including self

    const roomModal = document.getElementById('room-modal');
    const roomInput = document.getElementById('room-input');
    const roomInfo = document.getElementById('room-info');
    const displayRoomId = document.getElementById('display-room-id');
    const videoContainer = document.getElementById('video-container');

    function generateRoomId() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let id = '';
      for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
      return 'PB-' + id;
    }

    // Show/hide the modal
    document.getElementById('party-mode-btn').onclick = () => {
      roomModal.style.display = 'flex';
    };
    document.getElementById('close-modal-btn').onclick = () => {
      roomModal.style.display = 'none';
    };

    // ── Create Room (Host) ──
    document.getElementById('create-room-btn').onclick = async () => {
      if (!stream) { showToast('ENABLE CAMERA FIRST 📸'); return; }
      roomId = generateRoomId();
      roomModal.style.display = 'none';
      showToast('CREATING ROOM... ⏳');

      try {
        peer = new Peer(roomId, { debug: 0 });

        peer.on('open', (id) => {
          isHost = true;
          partyActive = true;
          displayRoomId.textContent = id;
          roomInfo.style.display = 'block';
          showToast(`ROOM CREATED: ${id} 🎉`);
          updateVideoGrid();
        });

        peer.on('call', (call) => {
          const count = Object.keys(peerConnections).length;
          if (count >= MAX_PEERS - 1) {
            call.close();
            return;
          }
          call.answer(stream);
          handleIncomingCall(call);
        });

        peer.on('connection', (conn) => {
          setupDataConnection(conn);
        });

        peer.on('error', (err) => {
          console.error('Peer error:', err);
          if (err.type === 'unavailable-id') {
            showToast('ROOM ID TAKEN! TRY AGAIN ❌');
            leaveRoom();
          } else {
            showToast('CONNECTION ERROR ❌');
          }
        });

      } catch (e) {
        showToast('FAILED TO CREATE ROOM ❌');
        console.error(e);
      }
    };

    // ── Join Room ──
    document.getElementById('join-room-btn').onclick = async () => {
      if (!stream) { showToast('ENABLE CAMERA FIRST 📸'); return; }
      const targetRoom = roomInput.value.trim().toUpperCase();
      if (!targetRoom) { showToast('ENTER A ROOM ID ✏️'); return; }
      roomModal.style.display = 'none';
      showToast('JOINING ROOM... ⏳');

      const myId = 'PB-' + Math.random().toString(36).substr(2, 8).toUpperCase();

      try {
        peer = new Peer(myId, { debug: 0 });

        peer.on('open', () => {
          roomId = targetRoom;
          isHost = false;
          partyActive = true;
          displayRoomId.textContent = roomId;
          roomInfo.style.display = 'block';

          // Data connection to host
          const conn = peer.connect(roomId, { reliable: true });
          setupDataConnection(conn);

          // Media call to host
          const call = peer.call(roomId, stream);
          handleOutgoingCall(call, roomId);
        });

        // Accept calls from other peers (host relays info)
        peer.on('call', (call) => {
          call.answer(stream);
          handleIncomingCall(call);
        });

        peer.on('connection', (conn) => {
          setupDataConnection(conn);
        });

        peer.on('error', (err) => {
          console.error('Peer error:', err);
          if (err.type === 'peer-unavailable') {
            showToast('ROOM NOT FOUND ❌');
            leaveRoom();
          } else {
            showToast('CONNECTION ERROR ❌');
          }
        });
      } catch (e) {
        showToast('FAILED TO JOIN ❌');
        console.error(e);
      }
    };

    function setupDataConnection(conn) {
      conn.on('open', () => {
        if (!peerConnections[conn.peer]) {
          peerConnections[conn.peer] = { conn: conn, call: null, videoEl: null };
        } else {
          peerConnections[conn.peer].conn = conn;
        }
        showToast(`FRIEND CONNECTED 🤝`);

        // Host tells new peer about existing peers
        if (isHost) {
          const existingPeers = Object.keys(peerConnections).filter(id => id !== conn.peer);
          conn.send({ type: 'peer-list', peers: existingPeers });
        }
      });

      conn.on('data', (data) => {
        if (data.type === 'peer-list' && !isHost) {
          // Connect to other peers in the room
          data.peers.forEach(peerId => {
            if (!peerConnections[peerId]) {
              const c = peer.connect(peerId, { reliable: true });
              setupDataConnection(c);
              const call = peer.call(peerId, stream);
              handleOutgoingCall(call, peerId);
            }
          });
        }
        if (data.type === 'sync-shoot') {
          // Remote-triggered photo: run local countdown & capture
          takeShot(true);
        }
      });

      conn.on('close', () => {
        removePeer(conn.peer);
      });
    }

    function handleIncomingCall(call) {
      call.on('stream', (remoteStream) => {
        addRemoteVideo(call.peer, remoteStream, call);
        showToast('VIDEO CONNECTED 📹');
      });
      call.on('close', () => removePeer(call.peer));
      call.on('error', () => removePeer(call.peer));
    }

    function handleOutgoingCall(call, peerId) {
      call.on('stream', (remoteStream) => {
        addRemoteVideo(peerId, remoteStream, call);
        showToast('VIDEO CONNECTED 📹');
      });
      call.on('close', () => removePeer(peerId));
      call.on('error', () => removePeer(peerId));
    }

    function addRemoteVideo(peerId, remoteStream, call) {
      // Don't duplicate
      if (peerConnections[peerId] && peerConnections[peerId].videoEl) return;

      const vid = document.createElement('video');
      vid.autoplay = true;
      vid.playsInline = true;
      vid.muted = false;
      vid.srcObject = remoteStream;
      vid.style.cssText = 'width:100%;height:100%;object-fit:cover;';
      vid.id = 'peer-video-' + peerId;

      // Add name label
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:relative;overflow:hidden;';
      wrapper.id = 'peer-wrap-' + peerId;
      const label = document.createElement('div');
      label.style.cssText = 'position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.6);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-family:DotGothic16,monospace;z-index:5;';
      label.textContent = '🟢 FRIEND';
      wrapper.appendChild(vid);
      wrapper.appendChild(label);
      videoContainer.appendChild(wrapper);

      if (!peerConnections[peerId]) peerConnections[peerId] = {};
      peerConnections[peerId].videoEl = wrapper;
      peerConnections[peerId].call = call;

      updateVideoGrid();
    }

    function removePeer(peerId) {
      const p = peerConnections[peerId];
      if (p) {
        if (p.videoEl) p.videoEl.remove();
        if (p.call) try { p.call.close(); } catch (e) {}
        if (p.conn) try { p.conn.close(); } catch (e) {}
        delete peerConnections[peerId];
      }
      updateVideoGrid();
      showToast('FRIEND LEFT 👋');
    }

    function updateVideoGrid() {
      const total = 1 + Object.keys(peerConnections).filter(k => peerConnections[k].videoEl).length;
      if (total === 1) {
        videoContainer.style.gridTemplateColumns = '1fr';
        videoContainer.style.gridTemplateRows = '1fr';
      } else if (total === 2) {
        videoContainer.style.gridTemplateColumns = '1fr 1fr';
        videoContainer.style.gridTemplateRows = '1fr';
      } else if (total <= 4) {
        videoContainer.style.gridTemplateColumns = '1fr 1fr';
        videoContainer.style.gridTemplateRows = '1fr 1fr';
      }
    }

    async function captureGrid() {
      const allVideos = videoContainer.querySelectorAll('video');
      const count = allVideos.length;
      
      const gc = document.createElement('canvas');
      gc.width = 1280;
      gc.height = 960;
      const gctx = gc.getContext('2d');
      gctx.fillStyle = '#000';
      gctx.fillRect(0, 0, gc.width, gc.height);
      
      // Apply current filter
      const b = document.getElementById('sl-b').value, cc = document.getElementById('sl-c').value,
        s = document.getElementById('sl-s').value, h = document.getElementById('sl-h').value;
      const m = `brightness(${b}%) contrast(${cc}%) saturate(${s}%) hue-rotate(${h}deg)`;
      gctx.filter = curFilter === 'none' ? m : curFilter + ' ' + m;

      if (count === 1) {
         drawCover(gctx, allVideos[0], 0, 0, 1280, 960);
      } else if (count === 2) {
         drawCover(gctx, allVideos[0], 0, 0, 640, 960);
         drawCover(gctx, allVideos[1], 640, 0, 640, 960);
         // divider
         gctx.strokeStyle = 'rgba(255,255,255,0.3)'; gctx.lineWidth = 4;
         gctx.beginPath(); gctx.moveTo(640, 0); gctx.lineTo(640, 960); gctx.stroke();
      } else if (count <= 4) {
         drawCover(gctx, allVideos[0], 0, 0, 640, 480);
         if (count > 1) drawCover(gctx, allVideos[1], 640, 0, 640, 480);
         if (count > 2) drawCover(gctx, allVideos[2], 0, 480, 640, 480);
         if (count > 3) drawCover(gctx, allVideos[3], 640, 480, 640, 480);
         
         gctx.strokeStyle = 'rgba(255,255,255,0.3)'; gctx.lineWidth = 4;
         gctx.beginPath(); gctx.moveTo(640, 0); gctx.lineTo(640, 960); gctx.stroke();
         gctx.beginPath(); gctx.moveTo(0, 480); gctx.lineTo(1280, 480); gctx.stroke();
      }

      function drawCover(ctx, vid, x, y, w, h) {
         // Also handle bgCanvas for the local video if segmentation is active!
         let source = vid;
         if (vid.id === 'video' && bgMode !== 'none' && bgCanvas.style.display !== 'none') {
             source = bgCanvas; // Use the segmented local canvas
         }
         
         const vw = source.videoWidth || source.width || w;
         const vh = source.videoHeight || source.height || h;
         const scale = Math.max(w / vw, h / vh);
         const sw = w / scale, sh = h / scale;
         const sx = (vw - sw) / 2, sy = (vh - sh) / 2;
         
         // Handle flipped for local video
         ctx.save();
         if (vid.id === 'video' && flipped) {
            ctx.translate(x + w, y);
            ctx.scale(-1, 1);
            ctx.drawImage(source, sx, sy, sw, sh, 0, 0, w, h);
         } else {
            ctx.drawImage(source, sx, sy, sw, sh, x, y, w, h);
         }
         ctx.restore();
      }

      return gc.toDataURL('image/jpeg', 0.92);
    }

    // ── Leave Room ──
    document.getElementById('leave-room-btn').onclick = leaveRoom;

    function leaveRoom() {
      Object.keys(peerConnections).forEach(removePeer);
      peerConnections = {};
      if (peer) { try { peer.destroy(); } catch (e) {} peer = null; }
      roomId = null;
      isHost = false;
      partyActive = false;
      roomInfo.style.display = 'none';
      // Remove remote video wrappers
      videoContainer.querySelectorAll('[id^="peer-wrap-"]').forEach(el => el.remove());
      updateVideoGrid();
      showToast('LEFT ROOM 👋');
    }
  </script>
</body>
